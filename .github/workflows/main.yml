name: Main

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "**.go"
      - go.mod
      - go.sum
      - .goreleaser*.yml
      - .gpipe.yml
      - Makefile

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    uses: ./.github/workflows/test.yml

  prerelease:
    needs: [lint, test]
    uses: ./.github/workflows/prerelease.yml
    secrets: inherit
