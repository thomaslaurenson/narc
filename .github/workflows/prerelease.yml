---
name: Prerelease

on: workflow_call

permissions:
  contents: write

jobs:
  prerelease:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build snapshot binaries
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          args: release --snapshot --clean --skip=sign

      - name: Delete existing dev release
        run: gh release delete dev --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create prerelease
        run: |
          gh release create dev \
            --title "Dev (Pre-release)" \
            --prerelease \
            --notes "**Commit:** ${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        run: |
          for dir in bin/narc_*/; do
            name=$(basename "$dir")
            file=$(find "$dir" -maxdepth 1 -type f | head -1)
            gh release upload dev "$file#$name"
          done
          gh release upload dev bin/checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
