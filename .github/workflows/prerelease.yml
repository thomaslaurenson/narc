---
name: Prerelease

on: workflow_call

permissions:
  contents: write
  id-token: write

jobs:
  prerelease:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: sigstore/cosign-installer@v4.1.2

      - name: Compute dev tag
        id: dev_tag
        run: |
          LATEST=$(git tag --list 'v*.*.*' | grep -Ev -- '-' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            echo "Error: no release tag found" >&2
            exit 1
          fi
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          DEV_TAG="$(echo "$LATEST" | cut -d. -f1-2).$((PATCH + 1))-dev"
          echo "dev_tag=${DEV_TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed dev tag: ${DEV_TAG} (from latest release: ${LATEST})"

      - name: Delete any existing dev release
        run: |
          gh release list --json tagName --jq '.[].tagName' \
            | grep -E -- '-dev$' \
            | xargs -r -I{} gh release delete {} --yes --cleanup-tag \
            || echo "No existing dev release to delete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push dev tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ steps.dev_tag.outputs.dev_tag }}
          git push origin ${{ steps.dev_tag.outputs.dev_tag }} --force

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --config .goreleaser.prerelease.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
