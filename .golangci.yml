version: "2"

run:
  timeout: 5m

linters:
  # Standard already includes: errcheck, govet, ineffassign, staticcheck, unused
  default: standard
  enable:
    - gosec  # Security-oriented checks - essential for a security tool
    - revive  # Opinionated style linter; replaces the archived golint
    - misspell  # Catch typos in comments and string literals
    - nilerr  # Detect returning nil instead of a non-nil error value
    - godot  # Ensure top-level comments end with a period

  settings:
    gosec:
      # G304: file path provided as taint input - we intentionally read user-provided paths
      excludes:
        - G304

    revive:
      rules:
        # Don't require doc comments on every exported symbol at this stage
        - name: exported
          disabled: true

    godot:
      scope: toplevel  # Only check top-level declaration comments

  exclusions:
    rules:
      # Test files are allowed to use hardcoded values and skip error checks
      - path: _test\.go
        linters:
          - gosec
          - nilerr
      # fmt.Fprintf to stderr/stdout is idiomatic in CLI tools; errors indicate
      # a broken terminal and are never actionable
      - linters:
          - errcheck
        text: 'Error return value of `fmt\.Fprintf` is not checked'
